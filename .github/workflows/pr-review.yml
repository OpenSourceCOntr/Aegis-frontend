name: Protocol Liaison (PR Reviewer)

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    name: Institutional PR Audit
    runs-on: ubuntu-latest
    env:
      # We use MAINTAINER_TOKEN if available, otherwise fallback to GITHUB_TOKEN.
      # MAINTAINER_TOKEN makes all actions (comments, approvals, merges) appear as bbkenny.
      GITHUB_TOKEN: ${{ secrets.MAINTAINER_TOKEN != '' && secrets.MAINTAINER_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: 🔍 Check for Issue Link
        run: |
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body -q .body)
          if ! echo "$PR_BODY" | grep -Eiq "(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved) #[0-9]+"; then
            gh pr comment ${{ github.event.pull_request.number }} --body "hey! i noticed you didn't link an issue in your PR description. please add \`Closes #ISSUE_NUMBER\` so we can automatically close it when merged!"
            exit 1
          fi

      - name: 🚨 Check for Merge Conflicts
        run: |
          MERGEABLE=$(gh pr view ${{ github.event.pull_request.number }} --json mergeable -q .mergeable)
          if [ "$MERGEABLE" == "CONFLICTING" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body "hey, it looks like there are merge conflicts with the \`main\` branch. could you pull the latest changes and resolve them so i can run my tests?"
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Review Core Logic
        id: build_review
        continue-on-error: true
        run: |
          cd smartcontract
          cargo test --all && cargo build --target wasm32-unknown-unknown --release

      - name: ❌ Handle Review Failure
        if: steps.build_review.outcome == 'failure'
        run: |
          PR_TITLE=$(gh pr view ${{ github.event.pull_request.number }} --json title -q .title)
          gh pr comment ${{ github.event.pull_request.number }} --body "hey, took a look at the PR for '$PR_TITLE'. actually, it looks like the smart contract tests or compilation is failing right now. mind checking the logs and fixing the errors? once it's passing, just push an update and we can get it merged."
          exit 1

      - name: ✅ Handle Review Success
        if: steps.build_review.outcome == 'success'
        run: |
          PR_TITLE=$(gh pr view ${{ github.event.pull_request.number }} --json title -q .title)
          
          # 1. Post a comment
          gh pr comment ${{ github.event.pull_request.number }} --body "hey, just went through the changes for '$PR_TITLE'. logic looks really solid and the tests passed perfectly. going ahead and approving + merging this into main now, thanks for the contribution!"
          
          # 2. Approve the PR (This will look like it came from bbkenny if MAINTAINER_TOKEN is used)
          gh pr review ${{ github.event.pull_request.number }} --approve -b "LGTM! Core logic and tests passed successfully."
          
          # 3. Merge the PR
          gh pr merge ${{ github.event.pull_request.number }} --merge --auto
